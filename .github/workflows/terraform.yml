# =============================================================================
# TERRAFORM INFRASTRUCTURE PIPELINE
# =============================================================================
# Triggers:
#   push / PR  → terraform-k8s-kubeadm/**  (validate + plan only, no changes)
#   workflow_dispatch → choose action: apply | destroy
#
# Jobs:
#   validate-and-scan  always runs  fmt → init → validate → checkov → plan
#   apply              manual only  init → plan → apply      (environment gate)
#   destroy            manual only  init → destroy            (environment gate)
#
# Remote State:
#   S3 bucket : cicd-test-13102022
#   State key : terraform-k8s-kubeadm/terraform.tfstate
#   Both apply and destroy connect to the same state — no artifacts needed.
#
# Manual Approval Gate (both apply + destroy):
#   Repo → Settings → Environments → "production" → Required Reviewers
#
# Required Secrets:
#   AWS_ACCESS_KEY_ID       IAM user with EC2 / SSM / IAM / S3 permissions
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION              e.g. us-east-1
# =============================================================================

name: Terraform Infrastructure Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-k8s-kubeadm/**'

  pull_request:
    branches:
      - main
    paths:
      - 'terraform-k8s-kubeadm/**'

  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        type: choice
        options:
          - apply
          - destroy

# Prevent two runs from touching S3 state simultaneously
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: terraform-k8s-kubeadm

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 ── Validate & Scan
# Runs on every trigger. Never modifies infrastructure.
# Initialises Terraform with the S3 remote backend so validate and plan
# can run against real provider schemas.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  validate-and-scan:
    name: Validate & Security Scan
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"   # cleaner Terraform output in CI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Format Check ─────────────────────────────────────────────────────
      # Fails immediately if any .tf file is not properly formatted.
      # Run `terraform fmt -recursive` locally to fix before pushing.
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # ── Init with S3 Remote Backend ──────────────────────────────────────
      # Region is passed via -backend-config because the backend block in
      # main.tf intentionally omits it (backend blocks don't support variables).
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false

      # ── Validate ─────────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Checkov IaC Security Scan ────────────────────────────────────────
      # Scans all .tf files for security misconfigurations.
      # Add a .checkov.yaml to suppress specific rules if needed.
      - name: Checkov IaC Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory:                 terraform-k8s-kubeadm
          framework:                 terraform
          output_format:             cli
          download_external_modules: true
          soft_fail:                 true
          # Set soft_fail: false to enforce security gate in production

      # ── Terraform Plan ───────────────────────────────────────────────────
      # Runs plan on push/PR and for apply dispatch.
      # Skipped for destroy dispatch (plan output is not meaningful for teardown).
      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        run: |
          terraform plan -input=false -no-color
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 ── Apply  (workflow_dispatch → action: apply only)
  # Gated by GitHub Environment "production" — a reviewer must approve.
  # Reads and writes remote state from S3 directly; no plan artifact needed.
  # ─────────────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply
    needs: validate-and-scan
    runs-on: ubuntu-latest
    environment: production          # ← manual approval gate
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'apply'
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Init re-connects to the same S3 remote state used by all other runs
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false

      # Fresh plan executed immediately before apply — atomic within this job.
      # The environment approval gate ensures a human reviewed before this runs.
      - name: Terraform Plan
        run: |
          terraform plan \
            -out=tfplan \
            -input=false \
            -no-color
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

      - name: Terraform Apply
        run: terraform apply -input=false tfplan
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 ── Destroy  (workflow_dispatch → action: destroy only)
  # Also gated by environment "production" approval.
  # Connects to the same S3 remote state so it knows exactly what to destroy.
  # ─────────────────────────────────────────────────────────────────────────────
  destroy:
    name: Terraform Destroy
    needs: validate-and-scan
    runs-on: ubuntu-latest
    environment: production          # ← same manual approval gate
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy'
    env:
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Init reads the same S3 remote state that apply wrote —
      # Terraform knows exactly which resources to destroy.
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -input=false

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -input=false \
            -no-color
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
