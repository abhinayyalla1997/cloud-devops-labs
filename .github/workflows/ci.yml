# =============================================================================
# CI PIPELINE — Security & Code Validation
# =============================================================================
# Trigger  : Pull Requests targeting main
# Purpose  : Gate code quality and security BEFORE merge
#
# Stages (all informational — pipeline never fails on security findings):
#   1. Maven Build + Test (generates compiled classes + JaCoCo coverage for Sonar)
#   2. OWASP Dependency Check  (SCA — third-party library vulnerabilities)
#   3. SonarQube SAST Scan     (static code analysis)
#   4. SonarQube Quality Gate  (quality gate result logged, does not block)
#   5. Trivy File System Scan  (filesystem + dependency vuln scan)
#
# Required Secrets:
#   SONAR_TOKEN      – SonarQube user token
#   SONAR_HOST_URL   – e.g. http://<sonarqube-ec2-ip>:9000
# =============================================================================

name: CI Pipeline – Security & Code Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  security-validate:
    name: Security & Code Validation
    runs-on: ubuntu-latest

    # Set default working directory for all run: steps
    defaults:
      run:
        working-directory: End-to-End-DevSecOps-Fullstack-Project/FullStack-Blogging-App

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      # fetch-depth: 0 required by SonarQube for proper blame/history analysis
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java 17 ───────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version:  '17'
          distribution:  'temurin'
          cache:         'maven'

      # ── Maven Build + Tests ───────────────────────────────────────────────
      # Runs tests and generates JaCoCo XML coverage report.
      # SonarQube uses the coverage data for quality gate evaluation.
      - name: Maven Build & Test
        run: mvn clean verify -B
        # -B = batch mode (no interactive prompts, cleaner CI output)

      # ── OWASP Dependency Check (SCA) ─────────────────────────────────────
      # Scans pom.xml dependencies against the NVD vulnerability database.
      # continue-on-error: true — findings are reported but do not block the pipeline.
      - name: OWASP Dependency Check
        working-directory: ${{ github.workspace }}
        continue-on-error: true
        run: |
          VERSION=$(curl -s https://jeremylong.github.io/DependencyCheck/current.txt)
          curl -sL "https://github.com/jeremylong/DependencyCheck/releases/download/v${VERSION}/dependency-check-${VERSION}-release.zip" \
            --output dependency-check.zip
          unzip -q dependency-check.zip
          mkdir -p reports
          ./dependency-check/bin/dependency-check.sh \
            --project "blogging-app" \
            --scan  "End-to-End-DevSecOps-Fullstack-Project/FullStack-Blogging-App" \
            --format HTML \
            --out   reports \
            --enableRetired \
            --disableAssembly

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:            owasp-dependency-report
          path:            ${{ github.workspace }}/reports/dependency-check-report.html
          retention-days:  7

      # ── SonarQube SAST Scan ───────────────────────────────────────────────
      # Static analysis of Java source code.
      # Requires compiled classes (produced above by Maven).
      # continue-on-error: true — scan result is informational, does not block merge.
      - name: SonarQube SAST Scan
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        with:
          projectBaseDir: End-to-End-DevSecOps-Fullstack-Project/FullStack-Blogging-App
          args: >
            -Dsonar.projectKey=blogging-app
            -Dsonar.projectName=blogging-app
            -Dsonar.java.binaries=target/classes
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── SonarQube Quality Gate ────────────────────────────────────────────
      # Reads the scan result. continue-on-error: true — gate result is logged only.
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        continue-on-error: true
        timeout-minutes: 5
        with:
          scanMetadataReportFile: End-to-End-DevSecOps-Fullstack-Project/FullStack-Blogging-App/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── Trivy File System Scan ────────────────────────────────────────────
      # Scans the source tree for vulnerabilities in dependencies and configs.
      # continue-on-error: true — findings are reported but do not block the pipeline.
      - name: Trivy File System Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type:      fs
          scan-ref:       End-to-End-DevSecOps-Fullstack-Project/FullStack-Blogging-App
          format:         table
          severity:       CRITICAL,HIGH
          exit-code:      '1'
          ignore-unfixed: true

      - name: Upload Trivy FS Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           trivy-fs-report
          path:           trivy-fs-results.txt
          retention-days: 7
